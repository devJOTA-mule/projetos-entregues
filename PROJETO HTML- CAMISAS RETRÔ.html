<!DOCTYPE html>  12345
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camisas Retrô</title>
  <style>
    body {
      margin: 0;
      font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
      background-color: #f5f5f5;
    }

    header {
      background-color: #111;
      color: #fff;
      padding: 20px;
      text-align: center; /* CENTRALIZA TUDO */
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    nav {
      margin-top: 10px;
    }

    nav a {
      color: #fff;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    nav a:hover {
      color: #f4c542;
    }

    .banner {
      margin-top: 15px;
      font-size: 18px;
      color: #f4c542;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">⚽ Camisas Retrô</div>

  <nav>
    <a href="#">Início</a>
    <a href="#">Coleções</a>
    <a href="#">Times</a>
    <a href="#">Promoções</a>
    <a href="#">Contato</a>
  </nav>

  <div class="banner">
    Reviva a história do futebol com camisas clássicas!
  </div>
</header>

</body>
</html>
